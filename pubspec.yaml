name: soma_alarm
description: SOMA calendar alarm + morning routine for Mike's Pixel.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  device_calendar: ^4.3.3
  flutter_local_notifications: ^17.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  workmanager: ^0.5.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  permission_handler: ^11.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
