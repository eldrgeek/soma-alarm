name: Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - run: |
          CHANGELOG=$(git log --oneline -5 | tr '\n' '|' | sed 's/|$//')
          flutter build apk --release \
            --dart-define=BUILD_SHA=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --dart-define="BUILD_CHANGELOG=$CHANGELOG"

      - uses: actions/upload-artifact@v4
        with:
          name: soma-alarm-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
